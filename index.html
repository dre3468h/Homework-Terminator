<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homework Terminator | Academic Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class', // Enable class-based dark mode
        theme: {
          extend: {
            fontFamily: {
              'sans': ['"Inter"', '"Noto Sans TC"', 'sans-serif'],
              'display': ['"Space Grotesk"', '"Noto Sans TC"', 'sans-serif'],
            },
            colors: {
              // Using CSS variables for dynamic theme switching
              'paper': 'var(--color-paper)', 
              'surface': 'var(--color-surface)',
              'ink': 'var(--color-ink)',
              'ink-light': 'var(--color-ink-light)',
              'accent': 'var(--color-accent)',
            },
            animation: {
              'fade-in': 'fadeIn 0.8s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* CSS Variables for Themeing */
      :root {
        /* Light Mode (Architectural / Paper) */
        --color-paper: #f5f5f4; /* Stone 100 */
        --color-surface: #ffffff; /* White */
        --color-ink: #1c1917; /* Stone 900 */
        --color-ink-light: #57534e; /* Stone 600 */
        --color-accent: #d97706; /* Amber 600 */
      }

      .dark {
        /* Dark Mode (Engineering / Blueprint) */
        --color-paper: #0c0a09; /* Stone 950 */
        --color-surface: #1c1917; /* Stone 900 */
        --color-ink: #f5f5f4; /* Stone 100 */
        --color-ink-light: #a8a29e; /* Stone 400 */
        --color-accent: #fbbf24; /* Amber 400 */
      }
      
      body {
        font-family: 'Inter', 'Noto Sans TC', sans-serif;
        background-color: var(--color-paper);
        color: var(--color-ink);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      
      /* Architectural Borders */
      .border-arch {
        border: 1px solid var(--color-ink);
      }
      
      .border-b-arch {
        border-bottom: 1px solid var(--color-ink);
      }

      .reveal {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body class="antialiased selection:bg-ink selection:text-paper">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
